<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Housing & Construction Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">

    <!-- Tabs at the TOP of the sidebar -->
    <div class="tabs">
      <button class="tab-button active" onclick="switchTab('rent')">Rent Calculator</button>
      <button class="tab-button" onclick="switchTab('construction')">Construction Calculator</button>
    </div>

    <!-- Rent Calculator -->
    <div id="rent-calculator" class="calculator active">
      <h3>Rent Calculator</h3>

      <div class="input-group">
        <label>Interest Rate (%)</label>
        <input id="interest" type="number" value="3">
      </div>

      <div class="input-group">
        <label>Bond Duration (years)</label>
        <input id="years" type="number" value="30">
      </div>

      <div class="input-group">
        <label>Vacancy Rate (%)</label>
        <input id="vacancy" type="number" value="5">
      </div>

      <div class="input-group">
        <label>Government Grant ($)</label>
        <input id="grant" type="number" value="0">
      </div>

      <div class="input-group">
        <label>Residents Min</label>
        <input id="resMin" type="number" value="1">
      </div>

      <div class="input-group">
        <label>Residents Max</label>
        <input id="resMax" type="number" value="50">
      </div>

      <div class="input-group">
        <label>Resident Increment</label>
        <input id="resStep" type="number" value="1">
      </div>

      <div class="input-group">
        <label>Property Cost Min ($)</label>
        <input id="costMin" type="number" value="100000">
      </div>

      <div class="input-group">
        <label>Property Cost Max ($)</label>
        <input id="costMax" type="number" value="5000000">
      </div>

      <div class="input-group">
        <label>Cost Increment ($)</label>
        <input id="costStep" type="number" value="100000">
      </div>
    </div>

    <!-- Construction Calculator -->
    <div id="construction-calculator" class="calculator">
      <h3>Construction Calculator</h3>

      <div class="input-group">
        <label>Cost per Sq Ft ($)</label>
        <input id="costSqFt" type="number" value="300">
      </div>

      <div class="input-group">
        <label>Sq Ft per Unit</label>
        <input id="sqFtUnit" type="number" value="800">
      </div>

      <div class="input-group">
        <label>Non-Unit Space (%)</label>
        <input id="nonUnit" type="number" value="20">
      </div>

      <div class="input-group">
        <label>Number of Units</label>
        <input id="units" type="number" value="20">
      </div>

      <div class="input-group">
        <label>Error Margin (%)</label>
        <input id="error" type="number" step="0.01" value="1.1">
      </div>

    </div>

  </div>

  <!-- Main Area -->
  <div class="main">
    <table id="rentTable"></table>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
