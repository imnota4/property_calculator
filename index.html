<!DOCTYPE html>
<html>

<head>
<title>Municipal Bond Housing Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Housing Bond Financing Calculator</h2>

<div class="inputs">

<label>Total Construction Cost ($)</label>
<input id="constructionCost" type="number" value="6000000">

<label>Government Grant ($)</label>
<input id="grant" type="number" value="0">

<label>Bond Interest Rate (%)</label>
<input id="interestRate" type="number" value="4">

<label>Bond Term (Years)</label>
<input id="termYears" type="number" value="30">

<label>Number of Units</label>
<input id="units" type="number" value="20">

<br><br>

<button onclick="calculate()">Calculate</button>

</div>

<div class="results">

<h3>Bond Financing Required</h3>
<p id="bondAmount">-</p>

<h3>Monthly Bond Payment</h3>
<p id="monthlyPayment">-</p>

<h3>Required Rent Per Unit</h3>
<p id="rentPerUnit">-</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
