<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Housing & Construction Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">

    <!-- Tabs at the TOP of the sidebar -->
    <div class="tabs">
      <button class="tab-button active" onclick="switchTab('rent')">Rent Calculator</button>
      <button class="tab-button" onclick="switchTab('construction')">Construction Calculator</button>
    </div>

    <!-- Rent Calculator -->
    <div id="rent-calculator" class="calculator active">

      <h3>Rent Calculator</h3>

      <div class="input-group">
        <label data-tooltip="The annual interest rate applied to the municipal bond. Interest on municipal bonds do not compound.">Interest Rate (%)</label>
        <input id="interest" type="number" value="3">
        <input type="range" id="interestSlider" min="0" max="10" step="0.01" value="3">
      </div>

      <div class="input-group">
        <label data-tooltip="The number of years until the bond reaches maturity and the original principal is repaid">Bond Duration (years)</label>
        <input id="years" type="number" value="30">
        <input type="range" id="yearsSlider" min="1" max="50" step="1" value="30">
      </div>

      <div class="input-group">
        <label data-tooltip="The expected percentage of units that will be vacant. People renting will need to pay on behalf of vacant rooms.">Vacancy Rate (%)</label>
        <input id="vacancy" type="number" value="5">
        <input type="range" id="vacancySlider" min="0" max="50" step="0.1" value="5">
      </div>

      <div class="input-group">
        <label data-tooltip="Government grants used to reduce the size of the bond and therefore reduce cost to rent">Government Grant ($)</label>
        <input id="grant" type="number" value="0">
        <input type="range" id="grantSlider" min="0" max="1000000" step="1000" value="0">
      </div>

      <div class="input-group">
        <label data-tooltip="Minimum number of renters the table should display">Residents Min</label>
        <input id="resMin" type="number" value="1">
        <input type="range" id="resMinSlider" min="1" max="50" step="1" value="1">
      </div>

      <div class="input-group">
        <label data-tooltip="Maximum number of renters the table should display">Residents Max</label>
        <input id="resMax" type="number" value="50">
        <input type="range" id="resMaxSlider" min="1" max="50" step="1" value="50">
      </div>

      <div class="input-group">
        <label data-tooltip="Step increment for residents in the table.">Resident Increment</label>
        <input id="resStep" type="number" value="1">
        <input type="range" id="resStepSlider" min="1" max="10" step="1" value="1">
      </div>

      <div class="input-group">
        <label data-tooltip="Minimum property cost the table should display">Property Cost Min ($)</label>
        <input id="costMin" type="number" value="100000">
        <input type="range" id="costMinSlider" min="50000" max="5000000" step="10000" value="100000">
      </div>

      <div class="input-group">
        <label data-tooltip="Maximum property cost the table should display">Property Cost Max ($)</label>
        <input id="costMax" type="number" value="5000000">
        <input type="range" id="costMaxSlider" min="100000" max="10000000" step="10000" value="5000000">
      </div>

      <div class="input-group">
        <label data-tooltip="Increment step for property cost in the table.">Cost Increment ($)</label>
        <input id="costStep" type="number" value="100000">
        <input type="range" id="costStepSlider" min="1000" max="1000000" step="1000" value="100000">
      </div>

    </div>

    <!-- Construction Calculator -->
    <div id="construction-calculator" class="calculator">

      <h3>Construction Calculator</h3>

      <div class="input-group">
        <label data-tooltip="Cost per square foot of construction.">Cost per Sq Ft ($)</label>
        <input id="costSqFt" type="number" value="300">
        <input type="range" id="costSqFtSlider" min="100" max="1000" step="10" value="300">
      </div>

      <div class="input-group">
        <label data-tooltip="Square feet per individual unit.">Sq Ft per Unit</label>
        <input id="sqFtUnit" type="number" value="800">
        <input type="range" id="sqFtUnitSlider" min="150" max="2000" step="10" value="800">
      </div>

      <div class="input-group">
        <label data-tooltip="Percentage of total building not used for units (common areas, hallways, etc.).">Non-Unit Space (%)</label>
        <input id="nonUnit" type="number" value="20">
        <input type="range" id="nonUnitSlider" min="0" max="50" step="1" value="20">
      </div>

      <div class="input-group">
        <label data-tooltip="Number of residential units in the building.">Number of Units</label>
        <input id="units" type="number" value="20">
        <input type="range" id="unitsSlider" min="1" max="50" step="1" value="20">
      </div>

      <div class="input-group">
        <label data-tooltip="Error margin percentage applied to cost estimate.">Error Margin (%)</label>
        <input id="error" type="number" step="0.01" value="1.1">
        <input type="range" id="errorSlider" min="1" max="2" step="0.01" value="1.1">
      </div>

      <h4>Total Building Sq Ft:</h4>
      <p id="totalSqFt">-</p>

      <h4>Total Construction Cost:</h4>
      <p id="totalCost">-</p>

    </div>

  </div>

  <!-- Main Area -->
  <div class="main">
    <div id="gridOuter">
      <div id="tableWrapper">
        <div id="rentTable" style="position: relative;"></div>
      </div>
      <div id="scrollbarH"><div id="thumbH"></div></div>
      <div id="scrollbarV"><div id="thumbV"></div></div>
    </div>
  </div>

</div>

<!-- Tooltip element -->
<div id="tooltip" class="tooltip"></div>

<script src="script.js"></script>
</body>
</html>
