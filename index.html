<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Housing & Construction Calculators</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <div class="sidebar">
      <div class="tabs">
        <button class="tab-button active" data-tab="rent">Rent Calculator</button>
        <button class="tab-button" data-tab="construction">Construction Calculator</button>
      </div>

      <!-- Rent Calculator Inputs -->
      <div id="rent-tab" class="tab-content active">
        <label>Interest Rate (%)</label>
        <input id="interest" type="range" min="0" max="10" step="0.01" value="3">
        <span id="interest-val">3%</span>

        <label>Bond Duration (years)</label>
        <input id="years" type="range" min="1" max="50" step="1" value="30">
        <span id="years-val">30</span>

        <label>Vacancy Rate (%)</label>
        <input id="vacancy" type="range" min="0" max="50" step="1" value="5">
        <span id="vacancy-val">5%</span>

        <label>Government Grant ($)</label>
        <input id="grant" type="range" min="0" max="1000000" step="1000" value="0">
        <span id="grant-val">$0</span>

        <hr>

        <label>Residents Min</label>
        <input id="resMin" type="number" value="1">

        <label>Residents Max</label>
        <input id="resMax" type="number" value="50">

        <label>Resident Increment</label>
        <input id="resStep" type="number" value="1">

        <label>Property Cost Min ($)</label>
        <input id="costMin" type="number" value="100000">

        <label>Property Cost Max ($)</label>
        <input id="costMax" type="number" value="5000000">

        <label>Cost Increment ($)</label>
        <input id="costStep" type="number" value="100000">
      </div>

      <!-- Construction Calculator Inputs -->
      <div id="construction-tab" class="tab-content">
        <label>Cost per Sq Ft ($)</label>
        <input id="costSqFt" type="range" min="50" max="1000" step="10" value="370">
        <span id="costSqFt-val">$370</span>

        <label>Sq Ft per Unit</label>
        <input id="sqFtUnit" type="range" min="100" max="2000" step="5" value="225">
        <span id="sqFtUnit-val">225</span>

        <label>Non-Unit Space (%)</label>
        <input id="nonUnit" type="range" min="0" max="50" step="1" value="30">
        <span id="nonUnit-val">30%</span>

        <label>Number of Units</label>
        <input id="units" type="range" min="1" max="50" step="1" value="5">
        <span id="units-val">5</span>

        <label>Error Margin (%)</label>
        <input id="constructionError" type="range" min="0" max="50" step="1" value="10">
        <span id="constructionError-val">10%</span>
      </div>
    </div>

    <!-- Results -->
    <div class="main-content">
      <div id="rent-result" class="tab-result active">
        <h3>Rent per Unit Table</h3>
        <div class="table-wrapper">
          <table id="rentTable"></table>
        </div>
      </div>
      <div id="construction-result" class="tab-result">
        <h3>Construction Cost Result</h3>
        <p id="totalSqFt">Total Sq Ft: -</p>
        <p id="totalCost">Total Cost: -</p>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
